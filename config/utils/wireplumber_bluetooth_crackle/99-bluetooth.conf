context.properties = {
    # Use a single sample rate commonly supported by Bluetooth A2DP devices
    default.clock.rate = 48000
    default.clock.allowed-rates = [ 48000 ]

    # Increase quantum to reduce crackles/pops and A/V desync for Bluetooth
    # Adjust min/max if needed; these values are conservative but effective.
    default.clock.quantum = 800
    default.clock.min-quantum = 512
    default.clock.max-quantum = 1024
}
